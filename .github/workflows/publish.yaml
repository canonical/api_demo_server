name: Build and publish image

on:
  push:
    tags:
      - '*'

permissions: {}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build-matrix: ${{ steps.set-matrix.outputs.build-matrix }}
    steps:
      - name: Set Build Matrix
        id: set-matrix
        env:
          TAG: ${{ github.ref_name }}
        run: |
          matrix=$(jq --null-input --compact-output \
            --arg tag "${TAG}" \
            '{
              include: [{
                name: "api-demo-server",
                tag: $tag,
                directory: ".",
                "artifact-name": "api-demo-server",
                "run-tests": true,
                lfs: false,
                "lfs-include": ""
              }]
            }')
          echo "build-matrix=${matrix}" >> $GITHUB_OUTPUT

  build:
    needs: [prepare]
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.build-matrix) }}
    uses: canonical/oci-factory/.github/workflows/Build-Rock.yaml@de55cd493720fc91cf5b629a34a10b3be7b0434a  # memcached_1.6-26.04_edge
    with:
      rock-repo: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      rock-repo-commit: ${{ github.head_ref || github.ref_name }}
      rockfile-directory: ${{ matrix.directory }}
      oci-archive-name: ${{ matrix.artifact-name }}
      # We don't have any special architecture or performance requirements,
      # so use GitHub's runners instead of Canonical's self-hosted runners.
      arch-map: '{"amd64":["ubuntu-24.04"],"arm64":["ubuntu-24.04-arm"]}'
      rockcraft-test: ${{ matrix.run-tests }}
    secrets:
      source-github-token: ${{ secrets.REPO_CLONER_TOKEN }}

  test:
    needs: [prepare, build]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build-matrix) }}
    uses: canonical/oci-factory/.github/workflows/Test-Rock.yaml@de55cd493720fc91cf5b629a34a10b3be7b0434a  # memcached_1.6-26.04_edge
    with:
      oci-archive-name: ${{ matrix.artifact-name }}

  attest-and-scan:
    needs: [prepare, test]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.build-matrix) }}
      fail-fast: false
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Download rock artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: ${{ matrix.artifact-name }}
          path: ./rock

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          image: oci-archive:./rock/${{ matrix.artifact-name }}
          format: spdx-json
          output-file: ./sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4
        with:
          subject-path: ./rock/${{ matrix.artifact-name }}

      - name: Attest SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4
        with:
          subject-path: ./rock/${{ matrix.artifact-name }}
          sbom-path: ./sbom.spdx.json

      - name: Scan rock (Grype)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7
        with:
          sbom: ./sbom.spdx.json
          fail-build: true
          severity-cutoff: high

  upload-ghcr:
    needs: [prepare, attest-and-scan]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.build-matrix) }}
      fail-fast: false
    permissions:
      packages: write
    steps:
      - name: Upload Rock to GHCR
        uses: canonical/oci-factory/.github/actions/upload-rock@de55cd493720fc91cf5b629a34a10b3be7b0434a  # memcached_1.6-26.04_edge
        with:
          artifact_name: ${{ matrix.artifact-name }}
          tags: ${{ matrix.tag }}
          name: ${{ matrix.name }}
          registry: ghcr.io/${{ github.repository }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
