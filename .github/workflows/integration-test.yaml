name: Integration Tests

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["**"]

permissions: {}

jobs:
  integration-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Create Docker network
        run: docker network create demo-net

      - name: Start PostgreSQL
        run: |
          docker run --name postgres \
            --network demo-net \
            -e POSTGRES_PASSWORD=mysecretpassword \
            -d postgres:16
          # Wait for postgres to be ready
          for i in $(seq 1 30); do
            docker exec postgres pg_isready -U postgres && break
            if [ "$i" -eq 30 ]; then echo "PostgreSQL did not become ready in time" && exit 1; fi
            sleep 1
          done

      - name: Build demo server image
        run: docker build -t api_demo_server .

      - name: Start demo server
        run: |
          docker run --name demo-server \
            --network demo-net \
            -e DEMO_SERVER_DB_HOST=postgres \
            -p 8000:8000 \
            -d api_demo_server
          # Wait for the server to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/version && break
            if [ "$i" -eq 30 ]; then echo "Demo server did not become ready in time" && exit 1; fi
            sleep 1
          done

      - name: Test /version endpoint
        run: |
          response=$(curl -sf http://localhost:8000/version)
          echo "Response: $response"
          echo "$response" | grep -q '"version"'

      - name: Test database endpoints
        run: |
          # Create the names table
          curl -sf -X POST http://localhost:8000/createtable

          # Add a name
          curl -sf -X POST http://localhost:8000/addname/ -d "name=Alice"

          # Retrieve names and verify Alice is present
          response=$(curl -sf http://localhost:8000/names)
          echo "Response: $response"
          echo "$response" | grep -q "Alice"

      - name: Show server logs on failure
        if: failure()
        run: docker logs demo-server
