name: Dependency vulnerability scan

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["**"]

permissions: {}

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8
      - name: Export locked dependencies (excluding this project)
        run: uv export --frozen --no-emit-project --no-hashes --format requirements-txt -o requirements.txt
      - name: Run pip-audit
        run: uv run pip-audit -r requirements.txt
