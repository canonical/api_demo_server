name: Version check

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1d1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Check that all versions match
        run: |
          set -euo pipefail

          # Extract the version from each source.
          v_init=$(grep -oP '^__version__\s*=\s*"\K[^"]+' src/api_demo_server/__init__.py)
          v_pyproject=$(grep -oP '^version\s*=\s*"\K[^"]+' pyproject.toml)
          v_rockcraft=$(grep -oP '^version:\s*"\K[^"]+' rockcraft.yaml)

          # Check for a version mismatch.
          echo "src/api_demo_server/__init__.py: $v_init"
          echo "pyproject.toml: $v_pyproject"
          echo "rockcraft.yaml: $v_rockcraft"
          if [[ "$v_init" != "$v_pyproject" || "$v_init" != "$v_rockcraft" ]]; then
            echo "::error::Version mismatch between __init__.py, pyproject.toml, rockcraft.yaml"
            exit 1
          fi
          echo "All versions match: $v_init"
      - name: Check that uv.lock is up to date
        run: uv lock --check
