name: Build and publish image

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions: {}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      ghcr-upload: 'true'
      build-matrix: ${{ steps.set-matrix.outputs.build-matrix }}
      arch-map: ${{ steps.set-map.outputs.arch-map }}
    steps:
      - name: Set Build Matrix
        id: set-matrix
        run: |
          echo 'build-matrix={"include":[{"name":"api-demo-server","tag":"2.0.0.dev0-24.04_edge","directory":".","artifact-name":"api-demo-server","run-tests":true,"lfs":false,"lfs-include":""}]}' >> $GITHUB_OUTPUT
      - name: Set Architecture Map
        id: set-map
        run: |
          if [[ "${{ github.repository_owner }}" != "canonical" ]]; then
            echo 'arch-map={"amd64":["ubuntu-24.04"],"arm64":["ubuntu-24.04-arm"]}' >> $GITHUB_OUTPUT
          fi

  build:
    needs: [prepare]
    permissions: {}
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.build-matrix) }}
    uses: canonical/oci-factory/.github/workflows/Build-Rock.yaml@43f2710f69c29e43fd90f9e600896a7e32de96de
    with:
      rock-repo: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      rock-repo-commit: ${{ github.head_ref || github.ref_name }}
      rockfile-directory: ${{ matrix.directory }}
      oci-archive-name: ${{ matrix.artifact-name }}
      arch-map: ${{ needs.prepare.outputs.arch-map }}
      rockcraft-test: ${{ matrix.run-tests }}
    secrets:
      source-github-token: ${{ secrets.REPO_CLONER_TOKEN }}

  test:
    needs: [prepare, build]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build-matrix) }}
    uses: canonical/oci-factory/.github/workflows/Test-Rock.yaml@43f2710f69c29e43fd90f9e600896a7e32de96de
    with:
      oci-archive-name: ${{ matrix.artifact-name }}
      ignored-vulnerabilities: CVE-2026-45447  # CVE affects OpenSSL version in Ubuntu base.

  upload-ghcr:
    needs: [prepare, test]
    runs-on: ubuntu-latest
    if: |
      needs.prepare.outputs.ghcr-upload == 'true' &&
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/master'
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.build-matrix) }}
      fail-fast: false
    permissions:
      packages: write
    steps:
      - name: Upload Rock to GHCR
        uses: canonical/oci-factory/.github/actions/upload-rock@43f2710f69c29e43fd90f9e600896a7e32de96de
        with:
          artifact_name: ${{ matrix.artifact-name }}
          tags: ${{ matrix.tag }}
          name: ${{ matrix.name }}
          registry: ghcr.io/${{ github.repository }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
