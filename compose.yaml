services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: mysecretpassword
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username postgres"]
      interval: 1s
      timeout: 5s
      retries: 10

  demo-server:
    image: api-demo-server:integration
    environment:
      DEMO_SERVER_DB_HOST: postgres
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/version')"]
      interval: 1s
      timeout: 5s
      retries: 10
